<div style="
  padding: 2rem;
  font-family: 'Roboto', sans-serif;
  max-width: 600px;
  margin: 4rem auto;
">

  <h1 style="font-size: 2rem; margin-bottom: 1.5rem;">
    📚 StudySync
  </h1>

  <!-- Loading -->
  @if (loading()) {
    <p style="color: #666;">⏳ Connecting to backend...</p>
  }

  <!-- Success -->
  @if (health()) {
    <div style="
      color: green;
      padding: 1.5rem;
      border: 2px solid green;
      border-radius: 8px;
      background: #f0fff0;
    ">
      <strong>✅ Backend Connected!</strong><br><br>
      Status &nbsp;: {{ health()!.status }}<br>
      Service &nbsp;: {{ health()!.service }}<br>
      Version &nbsp;: {{ health()!.version }}<br>
      Time &nbsp;&nbsp;&nbsp;&nbsp;: {{ health()!.timestamp }}
    </div>
  }

  <!-- Error -->
  @if (error()) {
    <div style="
      color: red;
      padding: 1.5rem;
      border: 2px solid red;
      border-radius: 8px;
      background: #fff0f0;
    ">
      ❌ {{ error() }}
    </div>
  }

  <router-outlet />

</div>
